name: Lint & Type Check

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - "site/**"
      - "*.mjs"
      - ".prettierrc.json"
      - "eslint.config.mjs"
      - "package.json"
      - "bun.lock"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "site/**"
      - "*.mjs"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-root:
    name: Root scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps
        run: bun install --frozen-lockfile

      - name: Lint scripts
        run: bun run lint

      - name: Format check scripts
        run: bun run format:check

  lint-site:
    name: Site (Astro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install site deps
        run: bun install --frozen-lockfile

      - name: Lint site
        run: bun run lint

      - name: Format check site
        run: bun run format:check

      - name: Type check (astro check)
        run: bun run check

      - name: Comment on PR failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Lint / type check failed.** Run `bun run lint:fix && bun run format` in root and `site/`, then `bun run check` in `site/`.',
            });

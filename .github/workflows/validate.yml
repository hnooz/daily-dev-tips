name: Validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'tips/**'
      - 'schemas/**'
      - 'scripts/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tips
        id: validate
        run: bun run validate
        continue-on-error: true

      - name: Comment failure on PR
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Tip validation failed.** Run `bun run validate` locally to see errors.\n\nCommon issues: missing required frontmatter fields, code > 15 lines, explanation > 600 chars, duplicate `codeHash`.'
            })

      - name: Fail job if validation failed
        if: steps.validate.outcome == 'failure'
        run: exit 1

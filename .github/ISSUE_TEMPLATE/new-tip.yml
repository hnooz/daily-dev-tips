name: Submit a tip
description: Propose a new atomic developer tip. A maintainer will convert it to a PR.
title: "tip: "
labels: ["tip-submission"]
body:
  - type: markdown
    attributes:
      value: |
        **Read [CONTRIBUTING.md](../CONTRIBUTING.md) before submitting.**
        One tip = one idea. Code block first, explanation second. 15 lines of code max. 600 chars of explanation max.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - frontend
        - backend
        - fullstack
        - mobile
        - devops
        - database
        - testing
        - tooling
        - other
    validations:
      required: true

  - type: input
    id: stack
    attributes:
      label: Stack
      description: "The specific framework or technology, lowercase, hyphenated (e.g. laravel, vue, react, rust, go). Existing stacks live under tips/ — new ones are welcome."
      placeholder: "laravel"
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Language
      description: "Language of the code block, lowercase (e.g. php, js, ts, python, go, rust, bash)."
      placeholder: "php"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Tip title
      description: "10–90 chars. Action-oriented: start with a verb. E.g. 'Use whenLoaded to keep API resources honest about relationships'"
      placeholder: "Use X to achieve Y"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: "1–5 tags, lowercase, hyphenated. E.g. eloquent, api-resources, n-plus-1"
      placeholder: "tag-one, tag-two"
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code
      description: "Max 15 lines. Do not include the code fences — paste raw code only."
      render: text
    validations:
      required: true

  - type: textarea
    id: explanation
    attributes:
      label: Explanation
      description: "Max 600 chars. Explain WHY, not what. The code already shows what."
      placeholder: "Explain the non-obvious behavior, tradeoff, or footgun this solves."
    validations:
      required: true

  - type: input
    id: github
    attributes:
      label: Your GitHub handle
      description: Required. This is the recognition — it renders on every reader's new tab.
      placeholder: "your-handle"
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Your full name
      placeholder: "First Last"
    validations:
      required: true

  - type: input
    id: file
    attributes:
      label: Typical file path (optional)
      description: "Where this code typically lives. E.g. app/Http/Resources/UserResource.php"
      placeholder: "app/..."

  - type: input
    id: source
    attributes:
      label: Source URL (optional)
      description: "Docs page, blog post, or issue that explains the concept further."
      placeholder: "https://..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Code block is ≤ 15 lines
          required: true
        - label: Explanation is ≤ 600 chars
          required: true
        - label: This tip is my own original work (not AI-generated)
          required: true
        - label: I've checked existing tips — no duplicate
          required: true
